add_newline = false

[line_break]
disabled = true

[battery]
full_symbol = "п•ё"
charging_symbol = "п–ғ"
discharging_symbol = "п–Ӣ"

[[battery.display]]
threshold = 30
style = "bold red"

[character]
error_symbol = "[п‘§](bold red)"
success_symbol = "[п‘ ](bold green)"

[cmd_duration]
min_time = 10_000  # Show command duration over 10,000 milliseconds (=10 sec)
format = "took [$duration]($style) "

[directory]
truncation_length = 5
format = "[$path]($style) [$lock_symbol]($lock_style)"
style = "bold white"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = "пҗҳ "
style = "bold green"

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_status]
conflicted = "п‘§"
ahead = "рҹҸҺпёҸ рҹ’Ё Г—${count} "
behind = "рҹҗўГ—${count} "
diverged = "рҹ”ұ рҹҸҺпёҸ рҹ’Ё Г—${ahead_count} рҹҗў Г—${behind_count} "
untracked = "п‘ҙ Г—${count} "
stashed = "рҹ“Ұ "
modified = "п‘ҷ Г—${count} "
staged = "п‘— Г—${count} "
renamed = "п‘ҡ Г—${count} "
deleted = "п‘ҳ Г—${count} "
style = "yellow"
format = "$all_status$ahead_behind"

[hostname]
ssh_only = false
format = "<[$hostname]($style)>"
trim_at = "-"
style = "bold dimmed white"
disabled = true

[memory_usage]
format = "$symbol[${ram}( | ${swap})]($style) "
show_percentage = true
show_swap = true
threshold = 50
style = "bold dimmed white"
disabled = true

[package]
disabled = true

[time]
disabled = true

[username]
style_user = "bold green"
show_always = false

[ruby]
symbol = "оҳ… "
style = "bold red"

[lua]
style = "bold purple"

[python]
symbol = "оҳҶ "
format = "[$symbol$version]($style) "
style = "bold cyan"

[nodejs]
disabled = false
format =	"via [$symbol$version]($style) "
symbol =	"пўҳ "
style =	"bold green"
